
name: Data Pipeline Verification Gate (CI/CD Unit & Integration Suite)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-and-test:
    name: Run CI Unit Tests & CD Integration Gate
    runs-on: ubuntu-latest
    
    # 1. Pull your encrypted credentials straight from your GitHub Secrets
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}

    steps:
    - name: Check out pipeline repository files
      uses: actions/checkout@v4

    - name: Initialise Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System and Python Libraries
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Securely Decode and Reconstruct Private Key
      env:
        PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
      run: |
        echo "$PRIVATE_KEY" | base64 --decode > rsa_key.p8
        chmod 600 rsa_key.p8
        echo "SNOWFLAKE_PRIVATE_KEY_PATH=$(pwd)/rsa_key.p8" >> $GITHUB_ENV

    - name: Run Core Unit Test Suite (Isolated Logic Verification)
      run: |
        # Verifies Python logic, null-handling, and regex parsing in local memory.
        # Mocks intercept database calls to ensure ZERO Snowflake compute costs are incurred.
        pytest -v test_orchestrator.py

    - name: Run Real Data Integration Gate (Live Snowflake Verification)
      run: |
        # Connects directly to your live Snowflake instance using decrypted secrets.
        # Validates active network routing, real schema configurations, and watermarks.
        python master_orchestrator.py --env dev

    - name: Secure Cleanup of Key Assets
      if: always() # This guarantees the key is deleted even if the tests fail
      run: |
        rm -f rsa_key.p8
